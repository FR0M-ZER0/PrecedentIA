apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: precedentia-summary
  namespace: argocd
spec:
  project: default
  source:
    repoURL: 'https://github.com/FR0M-ZER0/precedentia-summary.git'
    targetRevision: hml
    path: k8s
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
