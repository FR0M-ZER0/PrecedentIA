apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: precedentia-embedding
  namespace: argocd
spec:
  project: default
  source:
    repoURL: 'https://github.com/FR0M-ZER0/precedentia-embedding.git'
    targetRevision: feat/pia-73-precedent-continuous-deployment
    path: k8s
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
